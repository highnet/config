start-at-login = true

# Adapt the top-level split to the monitor shape instead of always columns.
# On a wide monitor new windows still open as columns; use alt-slash below to
# turn the current container into rows. AeroSpace does not auto-alternate.
default-root-container-orientation = 'auto'

[mode.main.binding]
alt-enter = 'exec-and-forget open -a Terminal'

# Focus
alt-h = 'focus left'
alt-l = 'focus right'
alt-j = 'focus down'
alt-k = 'focus up'

# Move the focused window within the layout
alt-shift-h = 'move left'
alt-shift-l = 'move right'
alt-shift-j = 'move down'
alt-shift-k = 'move up'

# Layout orientation of the current container.
# alt-v = rows (vertical stacking), alt-b = columns (horizontal).
# alt-slash toggles between the two.
alt-v = 'layout v_tiles'
alt-b = 'layout h_tiles'
alt-slash = 'layout tiles horizontal vertical'
# Toggle accordion (stacked) layout
alt-comma = 'layout accordion horizontal vertical'

# Resize the focused window
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Float / unfloat the focused window
alt-shift-space = 'layout floating tiling'
